# Nginx Configuration for Secure Localhost
# Enforces "Industrial-Grade" security headers discovered in Study Phase 1

server {
    # Changed to 8080 to allow non-root user binding in Docker
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security Headers (Study Layer 1 & 3)
    # Block iframe embedding to prevent clickjacking
    add_header X-Frame-Options "DENY";
    # Enable XSS protection filter
    add_header X-XSS-Protection "1; mode=block";
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff";
    
    # Content Security Policy (Study Layer 1)
    # - connect-src: Allow local APIs and LRCLIB
    # - img-src: Allow blob: for Analyzed waveforms
    # - media-src: Allow blob: and local file system access (via object URLs)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://lrclib.net https://api.mymemory.translated.net; img-src 'self' blob: data:; media-src 'self' blob: data:; font-src 'self' data: https://fonts.gstatic.com;";

    location / {
        try_files $uri $uri/ /index.html;
    }
}
