# Configurazione Nginx per Localhost Sicuro
# Applica header di sicurezza di "Grado Industriale" studiati nella Fase di Studio 1

server {
    # Porta cambiata a 8080 per permettere il binding da parte di un utente non-root in Docker
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compressione Gzip — riduce la dimensione delle risposte HTTP
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Header di Sicurezza (Livello di Studio 1 e 3)
    # Blocca l'incorporamento in iframe per prevenire attacchi di clickjacking
    add_header X-Frame-Options "DENY";
    # Attiva il filtro di protezione contro attacchi XSS
    add_header X-XSS-Protection "1; mode=block";
    # Impedisce al browser di indovinare il tipo MIME (MIME sniffing)
    add_header X-Content-Type-Options "nosniff";

    # Content Security Policy — Politica di Sicurezza dei Contenuti (Livello di Studio 1)
    # - connect-src: Permette API locali e LRCLIB
    # - img-src: Permette blob: per forme d'onda analizzate
    # - media-src: Permette blob: e accesso al file system locale (tramite object URL)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://lrclib.net https://api.mymemory.translated.net; img-src 'self' blob: data:; media-src 'self' blob: data:; font-src 'self' data: https://fonts.gstatic.com;";

    # Service worker and PWA manifest must never be cached, otherwise
    # security patches and SW updates cannot reach installed users.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires off;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}


# ======================================================================================
# SPIEGAZIONE TECNICA ESAUSTIVA — NGINX.CONF
# ======================================================================================
#
# COS'E' NGINX?
# ---------------
# Nginx (pronunciato "Engine-X") e' un web server ad alte prestazioni, utilizzato
# anche come reverse proxy, bilanciatore di carico (load balancer) e cache HTTP.
# In questo progetto, Nginx serve i file statici (HTML, CSS, JS) della nostra
# applicazione web e applica politiche di sicurezza tramite header HTTP.
#
# STRUTTURA DEL BLOCCO "server { }"
# ------------------------------------
# Il blocco "server" definisce un "virtual host", cioe' un sito web servito da Nginx.
# Si possono avere piu' blocchi server per servire siti diversi sulla stessa macchina.
#
# listen 8080;
#   - Indica a Nginx su quale porta ascoltare le connessioni HTTP in arrivo.
#   - Usiamo 8080 invece della porta standard 80 perche' il contenitore Docker
#     esegue Nginx come utente non-root, e solo root puo' aprire porte < 1024.
#
# server_name localhost;
#   - Definisce il nome del server (hostname). Nginx usa questo valore per decidere
#     quale blocco "server" gestire quando arriva una richiesta.
#   - "localhost" indica che questo server risponde solo a richieste dirette alla
#     macchina locale (127.0.0.1).
#
# root /usr/share/nginx/html;
#   - Definisce la directory radice da cui Nginx serve i file.
#   - Quando un browser richiede "/index.html", Nginx cerca il file in
#     /usr/share/nginx/html/index.html.
#
# index index.html;
#   - Specifica il file predefinito da servire quando si accede a una directory.
#   - Ad esempio, una richiesta a "/" viene risolta come "/index.html".
#
# COMPRESSIONE GZIP
# -------------------
# gzip on;
#   - Attiva la compressione Gzip sulle risposte HTTP.
#   - Il browser invia un header "Accept-Encoding: gzip" per indicare che supporta
#     la compressione. Nginx comprime la risposta prima di inviarla.
#   - Risultato: file piu' piccoli = caricamento piu' veloce = meno banda consumata.
#
# gzip_types ...;
#   - Specifica quali tipi di contenuto (MIME types) devono essere compressi.
#   - Includiamo: testo semplice, CSS, JSON, JavaScript, XML.
#   - Le immagini (JPEG, PNG) NON vengono compresse con Gzip perche' sono gia'
#     compresse nativamente — tentare di comprimerle ulteriormente sarebbe inutile
#     e rallenterebbe il server.
#
# HEADER DI SICUREZZA — SPIEGAZIONE DETTAGLIATA
# -------------------------------------------------
#
# 1) X-Frame-Options: "DENY"
#    - Impedisce a qualsiasi sito esterno di incorporare la nostra pagina in un <iframe>.
#    - Protegge dall'attacco "Clickjacking": un attaccante crea una pagina trasparente
#      sovrapposta alla nostra, ingannando l'utente a cliccare su pulsanti nascosti.
#    - "DENY" = nessun sito puo' incorniciare le nostre pagine (neanche noi stessi).
#    - Alternativa: "SAMEORIGIN" permette l'incorporamento solo dallo stesso dominio.
#
# 2) X-XSS-Protection: "1; mode=block"
#    - Attiva il filtro XSS integrato nel browser.
#    - "mode=block" dice al browser di bloccare completamente il rendering della pagina
#      se viene rilevato un tentativo di Cross-Site Scripting (XSS).
#    - XSS e' un attacco in cui codice JavaScript malevolo viene iniettato in una pagina
#      web, permettendo all'attaccante di rubare cookie, sessioni, o dati dell'utente.
#    - NOTA: Questo header e' considerato legacy; i browser moderni lo stanno
#      deprecando a favore di Content-Security-Policy, ma lo manteniamo per
#      compatibilita' con browser piu' vecchi.
#
# 3) X-Content-Type-Options: "nosniff"
#    - Impedisce al browser di effettuare "MIME sniffing", cioe' di indovinare il
#      tipo di un file basandosi sul suo contenuto piuttosto che sull'header
#      Content-Type dichiarato dal server.
#    - Senza questo header, un browser potrebbe interpretare un file .txt contenente
#      codice JavaScript come eseguibile, aprendo la porta ad attacchi XSS.
#
# 4) Content-Security-Policy (CSP)
#    - E' l'header di sicurezza piu' potente e complesso. Definisce una "whitelist"
#      (lista bianca) di sorgenti da cui il browser puo' caricare risorse.
#    - Ogni direttiva controlla un tipo specifico di risorsa:
#
#    default-src 'self'
#      → Regola predefinita: permette di caricare risorse solo dalla stessa origine
#        (stesso dominio, protocollo e porta). Tutto cio' che non ha una direttiva
#        specifica eredita questa regola.
#
#    script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net
#      → Script JavaScript: permessi dalla stessa origine, inline (nel codice HTML),
#        e dal CDN jsdelivr (per librerie esterne).
#      → 'unsafe-inline' permette tag <script> direttamente nell'HTML. Idealmente
#        andrebbe evitato e sostituito con nonce o hash, ma per semplicita' lo
#        manteniamo in questa fase di sviluppo.
#
#    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com
#      → Fogli di stile CSS: permessi dalla stessa origine, inline, e da Google Fonts.
#
#    connect-src 'self' https://lrclib.net https://api.mymemory.translated.net
#      → Connessioni di rete (fetch, XMLHttpRequest, WebSocket): permesse verso
#        la stessa origine, LRCLIB (API per i testi delle canzoni) e MyMemory
#        (API per le traduzioni).
#
#    img-src 'self' blob: data:
#      → Immagini: dalla stessa origine, da URL blob (generati da JavaScript per
#        visualizzare forme d'onda audio) e da URI data (immagini inline base64).
#
#    media-src 'self' blob: data:
#      → File multimediali (audio/video): stessa logica di img-src, necessario per
#        la riproduzione di audio attraverso object URL generati da JavaScript.
#
#    font-src 'self' data: https://fonts.gstatic.com
#      → Font: dalla stessa origine, inline base64, e da Google Fonts (gstatic.com
#        e' il CDN di Google che ospita i file dei font).
#
# BLOCCO LOCATION
# -----------------
# location / { try_files $uri $uri/ /index.html; }
#   - Definisce come Nginx gestisce le richieste per qualsiasi URL.
#   - "try_files" tenta in ordine:
#     1. $uri — il file richiesto esiste? (es. /css/style.css)
#     2. $uri/ — e' una directory con un index.html?
#     3. /index.html — se niente corrisponde, servi la pagina principale.
#   - Questo pattern e' fondamentale per le Single Page Application (SPA):
#     permette al routing lato client (JavaScript) di funzionare correttamente
#     anche quando l'utente accede direttamente a un URL come /learn o /practice.
#
# CONCETTI CHIAVE PER STUDENTI
# ------------------------------
# 1. DEFENSE IN DEPTH (Difesa in Profondita'): Non ci affidiamo a un singolo
#    meccanismo di sicurezza. Ogni header aggiunge un livello di protezione.
#    Se uno fallisce, gli altri continuano a proteggere l'applicazione.
#
# 2. PRINCIPIO DELLA WHITELIST: Nella sicurezza informatica, e' sempre meglio
#    "permettere solo cio' che e' necessario" piuttosto che "bloccare cio' che
#    e' pericoloso". La CSP segue questo principio: tutto e' bloccato per
#    impostazione predefinita, e noi esplicitiamo solo cio' che e' permesso.
#
# 3. HEADER HTTP: Sono metadati inviati dal server al browser insieme alla risposta.
#    Il browser li legge e si comporta di conseguenza. Gli header di sicurezza
#    sono istruzioni che dicono al browser: "comportati in modo sicuro".
#
# 4. SAME-ORIGIN POLICY (Politica della Stessa Origine): E' una regola fondamentale
#    dei browser web. Impedisce a una pagina di un dominio di accedere ai dati
#    di un altro dominio. La CSP estende e rafforza questa protezione.
#
# ======================================================================================
