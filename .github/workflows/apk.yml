# Build a signed Knowledge AIO Android APK.
# Doctrine §22.9, §22.11, §22.12, §17.10.
#
# Trigger:
#   - manual dispatch only (per §22.9 — per-commit APK builds are forbidden)
#
# Required GitHub Secrets (set under Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64   — base64-encoded contents of the release keystore
#   KEYSTORE_PASSWORD — the store password
#   KEY_ALIAS         — the key alias (e.g. "knowledge-aio")
#   KEY_PASSWORD      — the key password
#
# Pipeline:
#   1. Checkout, setup Node 22 from .nvmrc, setup Java 21, setup Android SDK
#   2. npm ci
#   3. apk:prepare (mirror sw.js#STATIC_ASSETS into www/)
#   4. cap sync android (copy www/ into android/app/src/main/assets/public/)
#   5. Decode keystore from KEYSTORE_BASE64 into a path local to the runner
#   6. ./gradlew assembleRelease — Gradle reads signing config via env vars
#   7. Verify the signed APK is < 30 MB (§22.12)
#   8. Upload signed APK as a workflow artifact (§22.10 — distribution path)
#
# The keystore file lives ONLY on the runner's tmpfs for the build duration
# and is wiped automatically when the runner terminates (§22.8).

name: APK Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag suffix (e.g. v1.0.0). Optional.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dev tooling
        run: npm ci

      - name: Verify doctrine static gates
        run: npm run doctrine:check

      - name: Run unit tests
        run: npm test

      - name: Prepare web bundle (cap-prepare)
        run: npm run apk:prepare

      - name: Capacitor sync (copy www/ into android/)
        run: npx cap sync android

      - name: Decode keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set — see SECURITY.md Runbook 6."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/keystore"
          # Strip whitespace before decoding — secrets re-uploaded with a
          # default `base64` (line-wrapped at 76 cols) would otherwise fail
          # with `base64: invalid input`. See run 25238316365 for the
          # reference incident; the tolerant decode lets future re-uploads
          # of KEYSTORE_BASE64 work whether or not `base64 -w0` was used.
          printf '%s' "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 -d > "$RUNNER_TEMP/keystore/release.keystore"
          chmod 600 "$RUNNER_TEMP/keystore/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore/release.keystore" >> "$GITHUB_ENV"

      - name: Assemble signed release APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK size budget (§22.12)
        run: |
          set -euo pipefail
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "::error::Expected APK at $APK but it does not exist."
            ls -la android/app/build/outputs/apk/release/ || true
            exit 1
          fi
          SIZE_BYTES=$(stat -c%s "$APK")
          SIZE_MB=$(( SIZE_BYTES / 1024 / 1024 ))
          MAX_MB=30
          echo "[size-budget] APK=$APK size=${SIZE_MB} MB (limit=${MAX_MB} MB)"
          if [ "$SIZE_MB" -gt "$MAX_MB" ]; then
            echo "::error::APK is ${SIZE_MB} MB, exceeds Doctrine §22.12 budget of ${MAX_MB} MB."
            exit 1
          fi

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-aio-${{ github.sha }}${{ github.event.inputs.release_tag && format('-{0}', github.event.inputs.release_tag) || '' }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Stage release assets (tagged dispatch only)
        if: ${{ github.event.inputs.release_tag != '' }}
        run: |
          set -euo pipefail
          SRC="android/app/build/outputs/apk/release/app-release.apk"
          mkdir -p "$RUNNER_TEMP/release"
          TAG="${{ github.event.inputs.release_tag }}"
          cp "$SRC" "$RUNNER_TEMP/release/knowledge-aio-${TAG}.apk"
          cp "$SRC" "$RUNNER_TEMP/release/knowledge-aio-latest.apk"
          ls -la "$RUNNER_TEMP/release/"

      - name: Publish to GitHub Release (tagged dispatch only)
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Knowledge AIO ${{ github.event.inputs.release_tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ runner.temp }}/release/knowledge-aio-${{ github.event.inputs.release_tag }}.apk
            ${{ runner.temp }}/release/knowledge-aio-latest.apk

      - name: Wipe keystore from runner
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${KEYSTORE_PATH:-}" ] && [ -f "$KEYSTORE_PATH" ]; then
            shred -u "$KEYSTORE_PATH" || rm -f "$KEYSTORE_PATH"
          fi
