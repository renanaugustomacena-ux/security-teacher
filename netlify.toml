[build]
  publish = "."
  command = "npm ci && npm test"

[build.environment]
  NODE_VERSION = "20"

# Per-request CSP nonce generation. Edge function rewrites every <script>/<style>
# tag in the HTML response to carry nonce="..." and emits a matching CSP header
# with 'strict-dynamic'. Dropping 'unsafe-inline' closes the last trivial XSS
# sink in the stack. Non-HTML responses bypass the fn untouched.
[[edge_functions]]
  function = "csp"
  path = "/*"

[[edge_functions]]
  function = "csp-report"
  path = "/csp-report"

[[headers]]
  for = "/*"
  [headers.values]
    # Transport + framing
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-Permitted-Cross-Domain-Policies = "none"
    Referrer-Policy = "no-referrer"
    # Cross-origin isolation. 'same-origin-allow-popups' keeps GIS sign-in popup
    # flow working while still severing window.opener cross-origin references.
    # COEP is intentionally omitted — it breaks the GIS iframe + Google avatars.
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-origin"
    Origin-Agent-Cluster = "?1"
    # Disable every browser API the app does not use, plus FLoC / Topics.
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self), interest-cohort=(), browsing-topics=()"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/.well-known/security.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
